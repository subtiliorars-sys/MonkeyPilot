<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chrome Agent Panel</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --panel-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-gold: #fbbf24;
      --accent-gold-hover: #f59e0b;
      --accent-indigo: #6366f1;
      --accent-indigo-hover: #4f46e5;
      --border-color: #334155;
    }

    body {
      margin: 0;
      padding: 12px;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
    }

    h2, h3, h4 {
      margin: 0 0 8px 0;
      font-weight: 600;
    }

    h2 {
      font-size: 16px;
      color: var(--accent-gold);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
      margin-bottom: 12px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-gold {
      background-color: var(--accent-gold);
      color: #000;
    }
    .btn-gold:hover {
      background-color: var(--accent-gold-hover);
    }

    .btn-indigo {
      background-color: var(--accent-indigo);
      color: #fff;
    }
    .btn-indigo:hover {
      background-color: var(--accent-indigo-hover);
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }
    .btn-outline:hover {
      background-color: rgba(255,255,255,0.05);
    }

    .input-text {
      background-color: #020617;
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      box-sizing: border-box;
      width: 100%;
    }
    .input-text:focus {
      outline: 1px solid var(--accent-indigo);
    }

    .panel {
      background-color: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .scrollable-y {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 12px;
      padding-right: 4px;
    }

    /* Queue styles */
    .queue-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #020617;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px 10px;
      margin-bottom: 6px;
      font-size: 11px;
    }
    .queue-item-text {
      flex: 1;
      margin-right: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .btn-remove {
      color: #ef4444;
      background: none;
      border: none;
      padding: 0;
      font-weight: bold;
    }

    /* Console styles */
    #console {
      background-color: #020617;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: 11px;
      color: #10b981;
      height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    .setting-row {
      margin-bottom: 8px;
    }
    .setting-row label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .hidden {
      display: none !important;
    }

    .mode-selector {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
    }
    .mode-selector label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>
    <span>🐒 Chrome Agent</span>
    <button id="btn-toggle-settings" class="btn-outline" title="Open or close the settings configuration panel">⚙ Settings</button>
  </h2>

  <!-- Settings Panel -->
  <div id="settings-panel" class="panel hidden">
    <h3>Settings</h3>
    <div class="setting-row">
      <label for="setting-key">OpenRouter API Key</label>
      <input type="password" id="setting-key" class="input-text" placeholder="sk-or-v1-..." title="Your OpenRouter or Ollama API authentication key">
    </div>
    <div class="setting-row">
      <label for="setting-vault-pass">Vault Passphrase (Optional - encrypts key on save)</label>
      <input type="password" id="setting-vault-pass" class="input-text" placeholder="Enter passphrase to encrypt API key" title="Enter a password to securely encrypt your API key in Chrome storage">
    </div>
    
    <details style="margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 8px;" title="Advanced agent configuration parameters">
      <summary style="cursor: pointer; font-size: 11px; color: var(--accent-gold); font-weight: bold; margin-bottom: 8px;">⚙ Advanced Parameters</summary>
      
      <div class="setting-row">
        <label for="setting-base-url">API Base URL (e.g. for Ollama)</label>
        <input type="text" id="setting-base-url" class="input-text" value="https://openrouter.ai/api/v1" placeholder="https://openrouter.ai/api/v1" title="The base API endpoint. Keep default for OpenRouter, or change to http://localhost:11434/v1 for Ollama">
      </div>
      <div class="setting-row">
        <label for="setting-model">Active Model</label>
        <input type="text" id="setting-model" class="input-text" value="auto" placeholder="auto or specific model ID" title="Enter 'auto' to auto-route prompts based on task complexity, or enter a specific model ID (e.g. google/gemini-2.5-flash)">
        <span style="font-size: 10px; color: var(--text-muted); display: block; margin-top: 4px;">Set to <strong>auto</strong> to let the agent choose the best model.</span>
      </div>
      <div class="setting-row">
        <label for="setting-speed">Execution Step Delay (ms)</label>
        <input type="range" id="setting-speed" min="100" max="3000" step="100" value="500" style="width: 100%;" title="Sets the delay time in milliseconds between executing steps to evade bot-detection systems">
        <span id="speed-val" style="font-size: 10px; color: var(--text-muted);">500ms</span>
      </div>
      <div class="setting-row">
        <label style="display: flex; align-items: center; gap: 6px;" title="Blocks the agent from navigating outside the original website domain (prevents popups/redirect loops)">
          <input type="checkbox" id="setting-domain-lock" class="accent-indigo">
          <strong>Domain Focus Lock</strong> (prevent navigating away)
        </label>
      </div>
      <div class="setting-row">
        <label style="display: flex; align-items: center; gap: 6px;" title="Keeps the agent from clicking invisible honeypot inputs used by websites to trap bots. Recommended to keep checked (active).">
          <input type="checkbox" id="setting-bypass-honeypot" class="accent-indigo">
          <strong>Bypass Honeypot Guard</strong> (allow interacting with hidden elements)
        </label>
      </div>
      <div class="setting-row">
        <label style="display: flex; align-items: center; gap: 6px;" title="Developer Mode: Disable all human simulation, delays, jitter, and stealth protections for speed testing on your own sites.">
          <input type="checkbox" id="setting-go-crazy" class="accent-indigo">
          <strong>Go Crazy Mode</strong> (disable human-like safety guards)
        </label>
      </div>
      <div class="setting-row">
        <label for="setting-rules">Custom Routing Rules (JSON rules: {"keyword": "model"})</label>
        <textarea id="setting-rules" class="input-text" style="height: 50px; resize: vertical;" placeholder='{"code": "anthropic/claude-3.5-sonnet"}' title="Define custom keyword rules to always override auto-routing to specific models (e.g. use Claude 3.5 Sonnet if prompt mentions coding)"></textarea>
      </div>
    </details>
    
    <button id="btn-save-settings" class="btn-indigo" style="width: 100%; margin-top: 10px;" title="Save your API keys and configuration parameters to local storage">Save Configuration</button>
  </div>

  <div class="scrollable-y">
    <!-- Queue Control Panel -->
    <div class="panel">
      <h3>Prompt Queue</h3>
      <div style="display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;">
        <textarea id="prompt-input" class="input-text" style="height: 60px; resize: vertical;" placeholder="Enter browser instruction..." title="Type your objective here (e.g. 'Log into Gmail and search for inbox receipts')"></textarea>
        <div style="display: flex; gap: 6px; justify-content: flex-end;">
          <button id="btn-selector-grab" class="btn-outline" title="Click here, then click any element on the webpage to automatically extract and paste its CSS selector path into your prompt" style="flex: 1;">🎯 Grab Selector</button>
          <button id="btn-add-queue" class="btn-indigo" title="Add your prompt instruction to the execution queue" style="flex: 1;">Queue Prompt</button>
        </div>
      </div>
      <div id="queue-list">
        <div class="text-slate-500 text-xs italic">No prompts queued.</div>
      </div>
    </div>

    <!-- Execution Mode -->
    <div class="panel">
      <h3>Execution Control</h3>
      <div class="mode-selector">
        <span>Mode:</span>
        <label title="Shows proposed JSON steps and waits for your manual approval before executing"><input type="radio" name="run-mode" value="plan" checked class="accent-indigo"> Plan (Approve steps)</label>
        <label title="Runs the queue completely autonomously step-by-step"><input type="radio" name="run-mode" value="auto" class="accent-indigo"> Auto (Autonomous)</label>
      </div>
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <div style="display: flex; gap: 6px;">
          <button id="btn-start" class="btn-gold" style="flex: 1;" title="Start executing the prompt queue sequentially">Start Agent</button>
          <button id="btn-kill" class="btn-outline" style="flex: 1; color: #ef4444; border-color: #ef4444;" title="Instantly terminate the active agent execution loop and empty the prompt queue">Kill Agent</button>
        </div>
        <div style="display: flex; gap: 6px;">
          <button id="btn-export-logs" class="btn-outline" style="flex: 1;" title="Download a formatted Markdown file containing execution history, logs, and screenshots">Export Logs</button>
          <button id="btn-clear-console" class="btn-outline" style="flex: 1;" title="Clear the live log output console window">Clear Log</button>
        </div>
      </div>
      <!-- User Review Action Panel (For Plan Mode) -->
      <div id="plan-approval-panel" class="hidden" style="margin-top: 10px; border-t: 1px solid var(--border-color); pt: 8px;">
        <p style="font-size: 11px; color: var(--accent-gold); margin: 0 0 6px 0;">Proposed action (JSON - Editable):</p>
        <textarea id="plan-proposal-textarea" class="input-text" style="font-family: monospace; font-size: 11px; height: 60px; resize: vertical; margin-bottom: 8px;" title="The JSON plan proposed by the LLM. You can edit this JSON directly before approving."></textarea>
        <div style="display: flex; gap: 6px;">
          <button id="btn-approve" class="btn-indigo" style="flex: 1; padding: 4px 8px;" title="Approve the proposed action above and proceed to execution">Approve Step</button>
          <button id="btn-reject" class="btn-outline" style="flex: 1; padding: 4px 8px; color: #ef4444; border-color: #ef4444;" title="Reject this step and pause agent execution">Reject</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Agent Output Console -->
  <h4>Live Execution Log</h4>
  <div id="console">Ready. Queue a prompt and click Start.</div>

  <script src="agent.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
